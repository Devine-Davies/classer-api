# docker-compose.yml for Laravel Sail with fixed 'sail' network
services:
  laravel.test:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${APP_PORT:-80}:80'
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      SCHEDULE_QUEUE_WORKERS: '${SCHEDULE_QUEUE_WORKERS:-false}'
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
      IGNITION_LOCAL_SITES_PATH: '${PWD}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
      - phpmyadmin

  jobs.runner:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      SCHEDULE_QUEUE_WORKERS: '${SCHEDULE_QUEUE_WORKERS:-false}'
      SCHEDULE_RUN_INTERVAL: '${SCHEDULE_RUN_INTERVAL:-2}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
    command: /bin/bash -lc "chmod +x /var/www/html/scripts/jobs/schedule-runner.sh && /var/www/html/scripts/jobs/schedule-runner.sh"

  jobs.worker.mail:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      SCHEDULE_QUEUE_WORKERS: '${SCHEDULE_QUEUE_WORKERS:-false}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work database --queue=mail,default --sleep=1 --tries=3 --timeout=120

  jobs.worker.cloudshare.verify:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      SCHEDULE_QUEUE_WORKERS: '${SCHEDULE_QUEUE_WORKERS:-false}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work cloudshare --queue=verify --sleep=1 --tries=3 --timeout=300

  jobs.worker.cloudshare.expire:
    build:
      context: ./vendor/laravel/sail/runtimes/8.4
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP}'
    image: sail-8.4/app
    environment:
      WWWUSER: '${WWWUSER}'
      LARAVEL_SAIL: 1
      SCHEDULE_QUEUE_WORKERS: '${SCHEDULE_QUEUE_WORKERS:-false}'
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      - mysql
      - redis
    command: php artisan queue:work cloudshare --queue=expire --sleep=1 --tries=3 --timeout=600

  mysql:
    image: 'mysql/mysql-server:8.0'
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'sail-mysql:/var/lib/mysql'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  redis:
    image: 'redis:alpine'
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'sail-redis:/data'
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
    networks:
      - sail

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - sail

volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local

networks:
  sail:
    driver: bridge
